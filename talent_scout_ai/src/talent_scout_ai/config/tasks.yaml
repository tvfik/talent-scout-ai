analyze_jd_task:
  description: >
    Analyze the following Job Description: {job_description}. 
    Identify the top 5 technical skills required and the minimum years of experience.
  expected_output: >
    A list of the core requirements and skills needed for the role.
  agent: jd_analyst

scout_candidates_task:
  description: >
    Use the candidate_search_tool to look at all candidates in the CSV.
    Compare their skills and bios to the requirements found by the JD Analyst.
    Assign a 'Match Score' (0-10) for each candidate.
  expected_output: >
    A list of the top 3 matching candidates with their Match Scores and a brief reasoning.
  agent: candidate_scout

engage_candidates_task:
  description: >
    For the top candidates found, simulate a brief recruitment outreach.
    Assume the candidate responds with a realistic level of interest.
    Analyze their simulated response and assign an 'Interest Score' (0-10).
  expected_output: >
    A summary of the simulated interaction and an Interest Score for each candidate.
  agent: engagement_recruiter

final_ranking_task:
  description: >
    1. Review the Match Scores (Skills) and Interest Scores provided by the previous agents for every candidate in the database.
    2. Audit every candidate and assign a final numerical Total Score based on:
       $$Total Score = (Match Score \times 0.7) + (Interest Score \times 0.3)$$
    3. Sort the qualifying candidates in descending order based strictly on their Total Score.
    4. Apply a strict Quality Gate: ONLY include a candidate in the final list if they meet BOTH of these criteria:
       - Match Score (Skills) is at least 3/10.
       - Interest Score is at least 3/10.
    5. If a candidate fails to meet either minimum threshold, exclude them entirely, regardless of their total score.
    6. Select and rank UP TO {limit} qualifying candidates from highest to lowest total score.
    7. If no candidates meet these minimums, return an empty JSON list [].
    8. For each qualifying candidate, generate a summary including: 'name', 'overview', 'tech_skills', 'experience', and 'motivation'.
    9. IMPORTANT: Keep 'overview' and 'motivation' to 2 sentences max. 
    10. Use bullet points for 'tech_skills' and 'experience'.
    11. Output strictly as a raw JSON list. No intro, outro, or conversational filler.
    
    JSON Keys: 'name', 'overview', 'tech_skills', 'experience', 'motivation'.
  expected_output: >
    A raw JSON list of qualifying candidates (Skills >= 4/10 AND Interest >= 3/10). Returns [] if no one qualifies.
  agent: engagement_recruiter